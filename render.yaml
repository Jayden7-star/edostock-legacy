services:
  - type: web
    name: edostock
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install --include=dev && npx vite build && npx prisma generate --schema=./prisma/schema.prisma && cp prisma/schema.prisma _schema.prisma && cp prisma/seed.ts _seed.ts
    startCommand: cp _schema.prisma prisma/schema.prisma && cp _seed.ts prisma/seed.ts && npx prisma db push --schema=./prisma/schema.prisma && npx tsx prisma/seed.ts && NODE_ENV=production npx tsx server/index.ts
    disk:
      name: edostock-data
      mountPath: /opt/render/project/src/prisma
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        value: file:/opt/render/project/src/prisma/production.db
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
